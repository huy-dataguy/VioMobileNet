version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis_server
    ports: ["6379:6379"]

  api:
    build: .
    image: viomobilenet-system
    container_name: viomobilenet_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - TF_GPU_ALLOCATOR=cuda_malloc_async
      - S3_ENDPOINT_URL=http://minio-vps:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=mypassword
      - S3_BUCKET_NAME=inference-results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '10gb'
    depends_on:
      - redis
      - minio-vps

  worker:
    build: .
    image: viomobilenet-system
    container_name: viomobilenet_worker
    command: celery -A worker.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - TF_GPU_ALLOCATOR=cuda_malloc_async
      - S3_ENDPOINT_URL=http://minio-vps:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=mypassword
      - S3_BUCKET_NAME=inference-results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
    depends_on:
      - redis
      - minio-vps

  # mediamtx-vps:
  #     image: bluenviron/mediamtx:latest
  #     container_name: mediamtx-vps
  #     network_mode: host
  #     volumes:
  #       - ./config/mediamtx.yml:/mediamtx.yml

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml
    ports:
      - "8554:8554"     # RTSP
      - "8000:8000/udp" # RTP
      - "8001:8001/udp" # RTCP


  minio-vps:
    image: minio/minio:latest
    container_name: minio-vps
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=mypassword
    volumes:
      - minio_data_vps:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio_client_vps:
    image: minio/mc:latest
    container_name: minio_client_vps
    depends_on:
      - minio-vps
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for MinIO...' &&
        sleep 5 &&
        mc alias set myminio http://minio-vps:9000 minio mypassword &&
        mc mb myminio/inference-results || true &&
        mc anonymous set download myminio/inference-results || true &&
        exit 0
      "

volumes:
  minio_data_vps:
