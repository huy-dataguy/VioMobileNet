version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis_server
    ports: ["6379:6379"]

  api:
    build: .
    image: viomobilenet-system
    container_name: viomobilenet_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
    depends_on:
      - redis

  worker:
    build: .
    image: viomobilenet-system
    container_name: viomobilenet_worker
    command: celery -A worker.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
    depends_on:
      - redis

  mediamtx:
      image: bluenviron/mediamtx:latest
      container_name: mediamtx
      network_mode: host
