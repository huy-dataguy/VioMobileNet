version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis_server
    ports: ["6379:6379"]

  api:
    build: .
    image: viomobilenet-system
    container_name: viomobilenet_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # --- Cấu hình kết nối MinIO cho API ---
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=mypassword
      - S3_BUCKET_NAME=inference-results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
    depends_on:
      - redis
      - minio

  worker:
    build: .
    image: viomobilenet-system
    container_name: viomobilenet_worker
    command: celery -A worker.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./uploads:/app/uploads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # --- Cấu hình kết nối MinIO cho Worker ---
      - S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=mypassword
      - S3_BUCKET_NAME=inference-results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: '4gb'
    depends_on:
      - redis
      - minio

  mediamtx:
      image: bluenviron/mediamtx:latest
      container_name: mediamtx
      network_mode: host
      volumes:
        - ./config/mediamtx.yml:/mediamtx.yml

  # --- MinIO Server (Dùng image chính thức) ---
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console UI Port
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=mypassword
    volumes:
      - minio_data:/data # MinIO chính thức lưu data ở /data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # --- MinIO Client (Tạo bucket tự động) ---
  minio_client:
    image: minio/mc:latest
    container_name: minio_client
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for MinIO...' &&
        sleep 5 &&
        mc alias set myminio http://minio:9000 minio mypassword &&
        mc mb myminio/inference-results || true &&
        mc anonymous set download myminio/inference-results || true &&
        exit 0
      "

# Khai báo volume để dữ liệu không bị mất khi restart container
volumes:
  minio_data:
